<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picture Me Perfect Photobooth — Bookings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #1a1a1a;
      --dark: #2c2c2c;
      --mid: #6b6b6b;
      --light: #a0a0a0;
      --border: #e8e4df;
      --bg: #fafafa;
      --card: #ffffff;
      --gold: #c9a84c;
      --gold-light: #f5eedd;
      --today-bg: #1a1a1a;
      --today-text: #ffffff;
      --event-bg: #1a1a1a;
      --event-text: #ffffff;
      --radius: 10px;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    .cal-header {
      width: 100%;
      max-width: 960px;
      text-align: center;
      padding: 48px 24px 32px;
    }

    .cal-header h1 {
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--black);
    }

    .cal-header .line {
      width: 48px;
      height: 3px;
      background: var(--black);
      margin: 16px auto 0;
      border-radius: 2px;
    }

    .cal-header p {
      margin-top: 10px;
      font-weight: 400;
      font-size: 0.85rem;
      color: var(--mid);
      letter-spacing: 0.04em;
    }

    .cal-card {
      width: 100%;
      max-width: 960px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 2px 20px rgba(0,0,0,0.05);
      padding: 32px;
      margin: 0 24px;
    }

    .cal-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .cal-toolbar .month-label {
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--black);
      letter-spacing: 0.03em;
      min-width: 200px;
      text-align: center;
    }

    .cal-toolbar .nav-group {
      display: flex;
      gap: 6px;
    }

    .cal-toolbar button {
      font-family: 'Montserrat', sans-serif;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--dark);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.15s ease;
    }

    .cal-toolbar button:hover {
      border-color: var(--dark);
      background: var(--black);
      color: #fff;
    }

    .cal-toolbar .nav-btn {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .cal-toolbar .today-btn {
      height: 38px;
      padding: 0 18px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .cal-toolbar .view-group {
      display: flex;
      gap: 6px;
    }

    .cal-toolbar .view-btn {
      height: 38px;
      padding: 0 16px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .cal-toolbar .view-btn.active {
      background: var(--black);
      border-color: var(--black);
      color: #fff;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0;
      border-top: 1.5px solid var(--border);
      border-left: 1.5px solid var(--border);
    }

    .cal-day-name {
      padding: 12px 4px;
      text-align: center;
      font-weight: 600;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--light);
      border-right: 1.5px solid var(--border);
      border-bottom: 1.5px solid var(--border);
    }

    .cal-cell {
      min-height: 100px;
      padding: 8px;
      border-right: 1.5px solid var(--border);
      border-bottom: 1.5px solid var(--border);
      position: relative;
      cursor: default;
      transition: background 0.12s ease;
    }

    .cal-cell:hover { background: #fdfcfa; }
    .cal-cell.outside { background: #fdfdfc; }

    .cal-cell .day-num {
      font-weight: 600;
      font-size: 0.8rem;
      color: var(--dark);
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      margin-bottom: 4px;
    }

    .cal-cell.outside .day-num { color: var(--light); }

    .cal-cell.today .day-num {
      background: var(--today-bg);
      color: var(--today-text);
    }

    .cal-event {
      font-size: 0.68rem;
      font-weight: 500;
      padding: 3px 7px;
      margin-bottom: 3px;
      border-radius: 4px;
      background: var(--event-bg);
      color: var(--event-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      transition: opacity 0.15s ease;
      letter-spacing: 0.01em;
    }

    .cal-event:hover { opacity: 0.8; }

    .cal-event.gold {
      background: var(--event-bg);
      color: var(--event-text);
    }

    .cal-more {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--dark);
      padding: 2px 4px;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    .cal-list { display: none; }
    .cal-list.active { display: block; }

    .cal-list-month {
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--light);
      padding: 20px 0 10px;
      border-bottom: 1.5px solid var(--border);
    }

    .cal-list-item {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      padding: 18px 0;
      border-bottom: 1px solid #f0eeeb;
      cursor: pointer;
    }

    .cal-list-date { min-width: 52px; text-align: center; }

    .cal-list-date .lday {
      font-weight: 800;
      font-size: 1.6rem;
      color: var(--black);
      line-height: 1;
    }

    .cal-list-date .ldow {
      font-weight: 500;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--light);
      margin-top: 2px;
    }

    .cal-list-info { flex: 1; }

    .cal-list-info .ltitle {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--black);
    }

    .cal-list-info .ltime {
      font-weight: 400;
      font-size: 0.78rem;
      color: var(--mid);
      margin-top: 3px;
    }

    .cal-list-info .ldesc {
      font-weight: 400;
      font-size: 0.75rem;
      color: var(--light);
      margin-top: 4px;
    }

    .cal-list-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--black);
      margin-top: 6px;
      flex-shrink: 0;
    }

    .cal-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--light);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    .cal-popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 100;
      backdrop-filter: blur(2px);
    }

    .cal-popup-overlay.active { display: flex; align-items: center; justify-content: center; }

    .cal-popup {
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 16px 48px rgba(0,0,0,0.12);
      position: relative;
    }

    .cal-popup .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--light);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.15s;
    }

    .cal-popup .close-btn:hover { background: #f0f0f0; }

    .cal-popup .popup-date {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--gold);
      margin-bottom: 6px;
    }

    .cal-popup .popup-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--black);
      margin-bottom: 8px;
    }

    .cal-popup .popup-time {
      font-size: 0.82rem;
      color: var(--mid);
      margin-bottom: 12px;
    }

    .cal-popup .popup-desc {
      font-size: 0.8rem;
      color: var(--mid);
      line-height: 1.6;
    }

    .cal-footer {
      width: 100%;
      text-align: center;
      padding: 24px 20px 36px;
      font-size: 0.72rem;
      color: var(--light);
      letter-spacing: 0.04em;
    }

    @media (max-width: 768px) {
      .cal-card { padding: 16px 12px; }
      .cal-toolbar { flex-wrap: wrap; gap: 12px; justify-content: center; flex-direction: column; align-items: center; }
      .cal-toolbar .nav-group { order: 1; }
      .cal-toolbar .month-label { order: 2; min-width: auto; font-size: 1.1rem; width: auto; }
      .cal-toolbar .view-group { order: 3; }
      .cal-cell { min-height: 64px; padding: 4px 3px; }
      .cal-cell .day-num { font-size: 0.68rem; width: 22px; height: 22px; }
      .cal-event { font-size: 0.5rem; padding: 2px 3px; border-radius: 3px; margin-bottom: 2px; }
      .cal-day-name { font-size: 0.58rem; padding: 8px 2px; letter-spacing: 0.05em; }
      .cal-header h1 { font-size: 1.1rem; }
      .cal-header { padding: 28px 16px 20px; }
      .cal-more { font-size: 0.5rem; }
    }

    @media (max-width: 480px) {
      .cal-card { padding: 12px 8px; border-radius: 8px; }
      .cal-cell { min-height: 52px; padding: 3px 2px; }
      .cal-cell .day-num { font-size: 0.62rem; width: 20px; height: 20px; margin-bottom: 2px; }
      .cal-day-name { font-size: 0.5rem; padding: 6px 1px; }
      .cal-event { font-size: 0.45rem; padding: 1px 2px; letter-spacing: -0.01em; }
      .cal-toolbar .nav-btn { width: 32px; height: 32px; font-size: 0.85rem; }
      .cal-toolbar .today-btn { height: 32px; padding: 0 12px; font-size: 0.65rem; }
      .cal-toolbar .view-btn { height: 32px; padding: 0 10px; font-size: 0.6rem; }
      .cal-more { font-size: 0.45rem; }
    }
  </style>
</head>
<body>

  <header class="cal-header">
    <h1>Picture Me Perfect Photobooth</h1>
    <div class="line"></div>
    <p>Upcoming Bookings</p>
  </header>

  <div class="cal-card">
    <div class="cal-toolbar">
      <div class="nav-group">
        <button class="nav-btn" id="prevBtn" aria-label="Previous">&#8592;</button>
        <button class="today-btn" id="todayBtn">Today</button>
        <button class="nav-btn" id="nextBtn" aria-label="Next">&#8594;</button>
      </div>
      <div class="month-label" id="monthLabel"></div>
      <div class="view-group">
        <button class="view-btn active" data-view="month">Month</button>
        <button class="view-btn" data-view="list">List</button>
      </div>
    </div>

    <div class="cal-grid-wrap" id="gridWrap">
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <div class="cal-list" id="calList"></div>
  </div>

  <footer class="cal-footer">&copy; 2026 Picture Me Perfect Photobooth</footer>

  <div class="cal-popup-overlay" id="popupOverlay">
    <div class="cal-popup">
      <button class="close-btn" id="popupClose">&#215;</button>
      <div class="popup-date" id="popupDate"></div>
      <div class="popup-title" id="popupTitle"></div>
      <div class="popup-time" id="popupTime"></div>
      <div class="popup-desc" id="popupDesc"></div>
    </div>
  </div>

  <script>
    const CALENDAR_ID = '189d365bf5fb8902c19aff4cb27e3cee91c793bb4b7999765c1cf1eff0dad056@group.calendar.google.com';
    const API_KEY = 'AIzaSyAmRZtY1X9hz-lpXTFQ8I7OBcMNG3jBxis';

    let currentDate = new Date();
    let currentView = 'month';
    let events = [];
    let cache = {};

    const $grid     = document.getElementById('calGrid');
    const $gridWrap = document.getElementById('gridWrap');
    const $list     = document.getElementById('calList');
    const $label    = document.getElementById('monthLabel');
    const $overlay  = document.getElementById('popupOverlay');

    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    async function fetchEvents(year, month) {
      const key = year + '-' + month;
      if (cache[key]) { events = cache[key]; return; }

      var timeMin = new Date(year, month - 1, 25).toISOString();
      var timeMax = new Date(year, month + 1, 7, 23, 59, 59).toISOString();

      var url = 'https://www.googleapis.com/calendar/v3/calendars/' +
        encodeURIComponent(CALENDAR_ID) +
        '/events?key=' + API_KEY +
        '&timeMin=' + timeMin +
        '&timeMax=' + timeMax +
        '&singleEvents=true&orderBy=startTime&maxResults=250';

      try {
        var res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var data = await res.json();

        events = (data.items || []).map(function(e) {
          return {
            title:       e.summary || 'Booking',
            start:       e.start.dateTime || e.start.date,
            end:         e.end.dateTime   || e.end.date,
            description: e.description    || '',
            location:    e.location       || '',
            allDay:      !!e.start.date
          };
        });

        cache[key] = events;
      } catch (err) {
        console.error('Calendar fetch error:', err);
        events = [];
      }
    }

    function renderMonth() {
      var year  = currentDate.getFullYear();
      var month = currentDate.getMonth();
      var today = new Date();

      $label.textContent = MONTHS[month] + ' ' + year;

      var firstDay    = new Date(year, month, 1).getDay();
      var daysInMonth = new Date(year, month + 1, 0).getDate();
      var daysInPrev  = new Date(year, month, 0).getDate();
      var totalCells  = Math.ceil((firstDay + daysInMonth) / 7) * 7;

      var html = '';
      ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(function(d) {
        html += '<div class="cal-day-name">' + d + '</div>';
      });

      for (var i = 0; i < totalCells; i++) {
        var day, isOutside = false, cellDate;

        if (i < firstDay) {
          day = daysInPrev - firstDay + i + 1;
          isOutside = true;
          cellDate = new Date(year, month - 1, day);
        } else if (i >= firstDay + daysInMonth) {
          day = i - firstDay - daysInMonth + 1;
          isOutside = true;
          cellDate = new Date(year, month + 1, day);
        } else {
          day = i - firstDay + 1;
          cellDate = new Date(year, month, day);
        }

        var isToday = !isOutside &&
          day === today.getDate() &&
          month === today.getMonth() &&
          year === today.getFullYear();

        var cls = 'cal-cell';
        if (isOutside) cls += ' outside';
        if (isToday) cls += ' today';

        var cellEvents = events.filter(function(e) {
          var d = new Date(e.start);
          return d.getFullYear() === cellDate.getFullYear() &&
                 d.getMonth()    === cellDate.getMonth() &&
                 d.getDate()     === cellDate.getDate();
        });

        var evHtml = '';
        var maxShow = 2;
        cellEvents.slice(0, maxShow).forEach(function(e, idx) {
          var c = idx % 2 === 0 ? '' : ' gold';
          evHtml += '<div class="cal-event' + c + '" data-eidx="' + events.indexOf(e) + '">' + e.title + '</div>';
        });
        if (cellEvents.length > maxShow) {
          evHtml += '<div class="cal-more">+' + (cellEvents.length - maxShow) + ' more</div>';
        }

        html += '<div class="' + cls + '"><div class="day-num">' + day + '</div>' + evHtml + '</div>';
      }

      $grid.innerHTML = html;

      $grid.querySelectorAll('.cal-event').forEach(function(el) {
        el.addEventListener('click', function() { showPopup(events[+el.dataset.eidx]); });
      });
    }

    function renderList() {
      var year  = currentDate.getFullYear();
      var month = currentDate.getMonth();
      $label.textContent = MONTHS[month] + ' ' + year;

      var sorted = events
        .filter(function(e) {
          var d = new Date(e.start);
          return d.getMonth() === month && d.getFullYear() === year;
        })
        .sort(function(a, b) { return new Date(a.start) - new Date(b.start); });

      if (!sorted.length) {
        $list.innerHTML = '<div class="cal-empty">No bookings this month</div>';
        return;
      }

      var html = '<div class="cal-list-month">' + MONTHS[month] + ' ' + year + '</div>';

      sorted.forEach(function(e) {
        var s = new Date(e.start);
        var en = new Date(e.end);
        var time = e.allDay ? 'All Day' :
          s.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }) +
          ' \u2014 ' +
          en.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });

        html += '<div class="cal-list-item" data-eidx="' + events.indexOf(e) + '">' +
          '<div class="cal-list-date"><div class="lday">' + s.getDate() + '</div><div class="ldow">' + DAYS[s.getDay()].slice(0,3) + '</div></div>' +
          '<div class="cal-list-dot"></div>' +
          '<div class="cal-list-info"><div class="ltitle">' + e.title + '</div><div class="ltime">' + time + '</div>' +
          (e.location ? '<div class="ldesc">' + e.location + '</div>' : '') +
          '</div></div>';
      });

      $list.innerHTML = html;
      $list.querySelectorAll('.cal-list-item').forEach(function(el) {
        el.addEventListener('click', function() { showPopup(events[+el.dataset.eidx]); });
      });
    }

    function showPopup(ev) {
      if (!ev) return;
      var s = new Date(ev.start);
      var en = new Date(ev.end);
      document.getElementById('popupDate').textContent =
        DAYS[s.getDay()] + ', ' + MONTHS[s.getMonth()] + ' ' + s.getDate();
      document.getElementById('popupTitle').textContent = ev.title;
      document.getElementById('popupTime').textContent = ev.allDay ? 'All Day' :
        s.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }) +
        ' \u2014 ' + en.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
      document.getElementById('popupDesc').textContent = ev.description || ev.location || '';
      $overlay.classList.add('active');
    }

    document.getElementById('popupClose').addEventListener('click', function() { $overlay.classList.remove('active'); });
    $overlay.addEventListener('click', function(e) { if (e.target === $overlay) $overlay.classList.remove('active'); });

    document.getElementById('prevBtn').addEventListener('click', function() { currentDate.setMonth(currentDate.getMonth() - 1); load(); });
    document.getElementById('nextBtn').addEventListener('click', function() { currentDate.setMonth(currentDate.getMonth() + 1); load(); });
    document.getElementById('todayBtn').addEventListener('click', function() { currentDate = new Date(); load(); });

    document.querySelectorAll('.view-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.view-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentView = btn.dataset.view;
        render();
      });
    });

    function render() {
      if (currentView === 'month') {
        $gridWrap.style.display = '';
        $list.classList.remove('active');
        renderMonth();
      } else {
        $gridWrap.style.display = 'none';
        $list.classList.add('active');
        renderList();
      }
    }

    async function load() {
      await fetchEvents(currentDate.getFullYear(), currentDate.getMonth());
      render();
    }

    // Auto-switch to list view on mobile for cleaner display
    if (window.innerWidth <= 600) {
      currentView = 'list';
      document.querySelectorAll('.view-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelector('.view-btn[data-view="list"]').classList.add('active');
    }

    load();
  </script>

</body>
</html>
